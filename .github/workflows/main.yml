name: YT Summary Tool

on:
  schedule:
    # Agendado para as 23:00 UTC (aproximadamente 20:00 no horário de Brasília)
    - cron: '0 23 * * *'
  workflow_dispatch: # Permite que você execute manualmente para testes

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          # Atualizado para 3.11 para evitar problemas de compatibilidade com bibliotecas Google
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser google-generativeai youtube-transcript-api pyTelegramBotAPI

      - name: Run summary script
        env:
          # Estas variáveis devem estar configuradas em Settings > Secrets do seu GitHub
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python youtube_summary.py
